<!DOCTYPE html>
<html>
<head>
    <title>Mohamad</title>

    <style>
        body {
            margin: 0;
            background: #0a0a0a;
            color: white;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        h1 {
            font-size: 50px;
            margin-bottom: 10px;
            animation: fadeIn 1.5s ease-in-out;
        }

        p {
            color: #aaa;
            font-size: 18px;
            margin-bottom: 30px;
            animation: fadeIn 2s ease-in-out;
        }

        .btn {
            padding: 12px 25px;
            border: 2px solid white;
            background: transparent;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            animation: fadeIn 2.5s ease-in-out;
        }

        .btn:hover {
            background: white;
            color: black;
            transform: scale(1.1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Mohamad Shakif Nawaz</h1>
        <p>Learning C++, till object oriented programming.</p>

        <a href="https://github.com/Mohamad-ui/mohamad-ui.github.io" target="_blank">
            <button class="btn">View My Progress</button>
        </a>
    </div>

</body>
</html>
